name: Deploy Django Backend to VPS

on:
  push:
    branches:
      - main
      - production

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set environment variables
        run: |
          if [ "${{ github.ref_name }}" == "production" ]; then
            echo "DEPLOY_PATH=/var/www/api.pujarighar.com" >> $GITHUB_ENV
            echo "VENV_PATH=/var/www/api.pujarighar.com/venv" >> $GITHUB_ENV
            echo "SERVICE_NAME=api-pujarighar" >> $GITHUB_ENV
          else
            echo "DEPLOY_PATH=/var/www/dev-api.pujarighar.com" >> $GITHUB_ENV
            echo "VENV_PATH=/var/www/dev-api.pujarighar.com/venv" >> $GITHUB_ENV
            echo "SERVICE_NAME=dev-api-pujarighar" >> $GITHUB_ENV
          fi

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy via rsync
        run: |
          rsync -avz --delete \
            --exclude='.htaccess' \
            --exclude='.git*' \
            --exclude='passenger_wsgi.pyc' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='.env' \
            --exclude='venv' \
            --exclude='tmp' \
            --exclude='media' \
            --exclude='staticfiles' \
            --exclude='logs' \
            -e "ssh -p ${{ secrets.SSH_PORT }} -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no" \
            ./ \
            ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:${{ env.DEPLOY_PATH }}/

      - name: Install dependencies and migrate
        run: |
          ssh -p ${{ secrets.SSH_PORT }} -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no \
            ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} \
            "source ${{ env.VENV_PATH }}/bin/activate && \
             cd ${{ env.DEPLOY_PATH }} && \
             pip install -r requirements.txt && \
             python manage.py migrate --noinput && \
             python manage.py collectstatic --noinput"

      - name: Restart Gunicorn service
        run: |
          ssh -p ${{ secrets.SSH_PORT }} -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no \
            ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} \
            "sudo systemctl restart ${{ env.SERVICE_NAME }}"

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/id_rsa
